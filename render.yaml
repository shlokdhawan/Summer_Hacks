services:
  # 1. Backend Service (FastAPI)
  - type: web
    name: inbox-zero-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: cache
          property: connectionString
      - key: API_BASE_URL
        sync: false # Set to your Render URL after deployment
      - key: FRONTEND_BASE_URL
        sync: false # Set to your Vercel URL after deployment
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false # Typically https://inbox-zero-backend.onrender.com/gmail/oauth/callback
      - key: GEMINI_API_KEY
        sync: false

  # 2. Redis Cache
  - type: redis
    name: cache
    plan: free
    ipAllowList: [] # Only allow internal traffic
